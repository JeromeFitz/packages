allowBuilds:
  esbuild: true
  sharp: true
  syncpack: true
  turbo: true
autoInstallPeers: false
lockfile: true
nodeOptions: "--experimental-strip-types --disable-warning=ExperimentalWarning"
overrides:
  "@semantic-release/npm@^13.0.0": ^13.1.5
  conventional-changelog-writer@^8.0.0: ^8.4.0
  handlebars@^4.0.0: ^4.7.9
  js-yaml@^3.0.0: ^3.14.2
  js-yaml@^4.0.0: ^4.1.1
  micromatch@^4.0.0: ^4.0.8
  lodash@^4.0.0: ^4.18.0
  lodash-es@^4.0.0: ^4.18.0
  picomatch@^2.0.0: ^2.3.2
  picomatch@^3.0.0: ^3.0.2
  picomatch@^4.0.0: ^4.0.4
  tar-fs@^2.0.0: ^2.1.4
  tar-fs@^3.0.0: ^3.1.1
packages:
  - "config/*"
  - "examples/*"
  - "packages/*"
  - "!config/eslint-config"
  - "!config/jest-config"
  - "!config/jest-presets"
  - "!config/lint-staged"
  - "!config/lighthouse-config"
  - "!examples/design-system"
  - "!packages/design-system"
  - "!packages/spotify"
patchedDependencies:
  "@semantic-release/commit-analyzer@13.0.1": patches/@semantic-release__commit-analyzer@13.0.0.patch
publicHoistPattern:
  - "@mdx-js/react"
  - "@storybook*"
  - "*ccommit*"
  - "*eslint*"
  - "*lint-staged*"
  - "*oxfmt*"
  - "*oxlint*"
  - "*playwright*"
  - "*semantic*"
  - "*testing-library*"
  - "*types*"
registry: https://registry.npmjs.org/
saveExact: true
strictPeerDependencies: false
