# name: 'Lint'
name: "🚨️  "
description: "Localized Lint"
author: "JeromeFitz"

inputs:
  TURBO_TEAM:
    description: "ID for Turbo"
    required: true
  TURBO_TOKEN:
    description: "ID for Turbo"
    required: true

runs:
  using: "composite"
  steps:
    - name: "🚨️  Lint: Syncpack"
      id: lint-syncpack
      shell: bash
      run: |
        pnpm run lint:packages

    - name: "🚨️  Lint: Quality"
      id: lint-oxc
      shell: bash
      env:
        TURBO_TEAM: ${{ inputs.TURBO_TEAM }}
        TURBO_TOKEN: ${{ inputs.TURBO_TOKEN }}
      run: |
        pnpm turbo run quality --cache-dir=".cache-turbo" -- --format=github

    - name: "🚨️  Lint: TypeScript"
      id: lint-ts
      shell: bash
      env:
        TURBO_TEAM: ${{ inputs.TURBO_TEAM }}
        TURBO_TOKEN: ${{ inputs.TURBO_TOKEN }}
      run: |
        pnpm turbo run lint:ts --cache-dir=".cache-turbo"
