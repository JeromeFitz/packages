name: "  ▶️  Pull"

on:
  pull_request:
    branches:
      - main
      - canary
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft

concurrency:
  group: pull-${{ github.ref }}-1
  cancel-in-progress: true

env:
  GH_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
  GH_DEPLOY_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
  GH_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  pull:
    name: "👷️  CI"
    if: github.event.pull_request.draft == false && !contains(github.event.head_commit.message, '[skip ci]')
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    env:
      GH_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      IS_ACTOR_VERIFIED: ${{ github.actor == 'jeromefitz' || github.actor == 'renovate[bot]' }}
      IS_ACTOR_JEROMEFITZ: ${{ github.actor == 'jeromefitz' }}
      IS_ACTOR_DEPENDABOT: ${{ github.actor == 'dependabot[bot]' }}
      IS_ACTOR_RENOVATE: ${{ github.actor == 'renovate[bot]' }}
    steps:
      - name: "🐙️  Checkout"
        id: pull-checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 10
          persist-credentials: false

      - name: "💽️  Init"
        id: pull-init
        uses: ./.github/actions/init

      # - name: '🧪 debug'
      #   id: pull-debug
      #   shell: bash
      #   run: |
      #     echo 'IS_ACTOR_VERIFIED:   ${{ env.IS_ACTOR_VERIFIED }}'
      #     echo 'IS_ACTOR_JEROMEFITZ: ${{ env.IS_ACTOR_JEROMEFITZ }}'
      #     echo 'IS_ACTOR_RENOVATE:   ${{ env.IS_ACTOR_RENOVATE }}'
      #     echo 'github.actor:        ${{ github.actor }}'

      # - name: '🧪 debug ii'
      #   id: pull-debug-ii
      #   if: ${{ env.IS_ACTOR_VERIFIED == 'true' }}
      #   shell: bash
      #   run: |
      #     echo 'Note: true is a string 😑'

      - name: "📦  Install"
        id: pull-install
        uses: ./.github/actions/install

      - name: "🔺️  Cache (turbo)"
        id: pull-cache-turbo
        uses: ./.github/actions/cache-turbo
        with:
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

      - name: "🚨️  Lint"
        id: pull-lint
        uses: ./.github/actions/lint
        with:
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

      - name: "🧪  Test"
        id: pull-test
        uses: ./.github/actions/test
        with:
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

      - name: "📊  Coverage (conventional-gitmoji)"
        id: pull-coverage-conventional-gitmoji
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GH_BOT_TOKEN }}
          name: "@jeromefitz/conventional-gitmoji"
          json-final-path: packages/conventional-gitmoji/coverage/coverage-final.json
          json-summary-path: packages/conventional-gitmoji/coverage/coverage-summary.json
          vite-config-path: packages/conventional-gitmoji/vitest.config.ts

      - name: "📊  Coverage (release-notes-generator)"
        id: pull-coverage-release-notes-generator
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GH_BOT_TOKEN }}
          name: "@jeromefitz/release-notes-generator"
          json-final-path: packages/release-notes-generator/coverage/coverage-final.json
          json-summary-path: packages/release-notes-generator/coverage/coverage-summary.json
          vite-config-path: packages/release-notes-generator/vitest.config.ts

      - name: "📊  Coverage (semantic)"
        id: pull-coverage-semantic
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GH_BOT_TOKEN }}
          name: "@jeromefitz/semantic"
          json-final-path: packages/semantic/coverage/coverage-final.json
          json-summary-path: packages/semantic/coverage/coverage-summary.json
          vite-config-path: packages/semantic/vitest.config.ts

      # https://docs.github.com/en/actions/learn-github-actions/expressions
      - name: "📛  Commit Message"
        id: pull-commit-message
        run: |
          echo "message=$(git log --no-merges -1 --oneline)" >> $GITHUB_OUTPUT

      - name: "🏗️  Build"
        id: pull-build
        uses: ./.github/actions/build
        with:
          BUILD_COMMAND: "build"
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
