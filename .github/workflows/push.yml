name: "  🔀️  Push"

on:
  push:
    branches:
      - main
      - canary
      - develop
      - ci/**
      - feat/**
      - feature/**
      - fix/**
      - refactor/**
      - release/**
      - NICE-**
      - oxc/**

concurrency:
  group: push-${{ github.ref }}-1
  cancel-in-progress: true

env:
  GH_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
  GH_DEPLOY_TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

permissions:
  contents: read

jobs:
  pull:
    name: "👷️  CI"
    if: (contains(github.event.head_commit.message, '[b]') || (github.ref == 'refs/heads/main' && github.actor != 'renovate[bot]')) && !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    env:
      GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: "🐙️  Checkout"
        id: pull-checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 10
          persist-credentials: false

      - name: "💽️  Init"
        id: push-init
        uses: ./.github/actions/init

      - name: "📦  Install"
        id: push-install
        uses: ./.github/actions/install

      - name: "🔺️  Cache (turbo)"
        id: push-cache-turbo
        uses: ./.github/actions/cache-turbo
        with:
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

      - name: "🚨️  Lint"
        id: push-lint
        uses: ./.github/actions/lint
        with:
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

      - name: "🧪  Test"
        id: push-test
        uses: ./.github/actions/test
        with:
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

      # https://docs.github.com/en/actions/learn-github-actions/expressions
      - name: "📛  Commit Message"
        id: push-commit-message
        run: |
          echo "message=$(git log --no-merges -1 --oneline)" >> $GITHUB_OUTPUT

      - name: "🏗️  Build"
        id: push-build
        uses: ./.github/actions/build
        with:
          BUILD_COMMAND: "build"
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

      - name: "🏷️  Release"
        id: push-release
        if: ${{ contains(steps.push-commit-message.outputs.message, '[b]') }}
        uses: ./.github/actions/release
        with:
          GH_TOKEN: ${{ env.GH_BOT_TOKEN }}
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
